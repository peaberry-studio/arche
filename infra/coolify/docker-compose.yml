# Arche — Coolify Docker Compose (Legacy)
#
# RECOMMENDED: Deploy as separate Coolify resources instead of this compose file.
# See README.md for the recommended setup with native rolling updates.
#
# This compose file is kept for backward compatibility and simpler setups
# where zero-downtime is not required.

name: arche

services:
  docker-socket-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:master
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      NETWORKS: 1
      IMAGES: 1
      INFO: 1
      POST: 1
      VOLUMES: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: arche
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  web:
    build:
      context: ../../apps/web
      dockerfile: Containerfile
    restart: unless-stopped
    environment:
      # Domain (set in Coolify UI)
      ARCHE_DOMAIN: ${ARCHE_DOMAIN:?}

      # Database (uses Coolify magic variable)
      DATABASE_URL: postgresql://postgres:${SERVICE_PASSWORD_POSTGRES}@postgres:5432/arche?schema=public

      # Secrets (required - set in Coolify UI)
      ARCHE_SESSION_PEPPER: ${ARCHE_SESSION_PEPPER:?}
      ARCHE_ENCRYPTION_KEY: ${ARCHE_ENCRYPTION_KEY:?}
      ARCHE_INTERNAL_TOKEN: ${ARCHE_INTERNAL_TOKEN:?}
      ARCHE_GATEWAY_TOKEN_SECRET: ${ARCHE_GATEWAY_TOKEN_SECRET:?}
      ARCHE_CONNECTOR_OAUTH_STATE_SECRET: ${ARCHE_CONNECTOR_OAUTH_STATE_SECRET:?}
      ARCHE_GATEWAY_TOKEN_TTL_SECONDS: ${ARCHE_GATEWAY_TOKEN_TTL_SECONDS:-86400}
      ARCHE_GATEWAY_BASE_URL: ${ARCHE_GATEWAY_BASE_URL:-http://web:3000}
      ARCHE_PUBLIC_BASE_URL: ${ARCHE_PUBLIC_BASE_URL:-}
      ARCHE_SESSION_TTL_DAYS: ${ARCHE_SESSION_TTL_DAYS:-7}
      ARCHE_CONNECTOR_GATEWAY_BASE_URL: ${ARCHE_CONNECTOR_GATEWAY_BASE_URL:-}
      ARCHE_CONNECTOR_GATEWAY_TOKEN_SECRET: ${ARCHE_CONNECTOR_GATEWAY_TOKEN_SECRET:-}

      # Cookies
      ARCHE_COOKIE_SECURE: ${ARCHE_COOKIE_SECURE:-true}

      # Seed admin
      ARCHE_SEED_ADMIN_EMAIL: ${ARCHE_SEED_ADMIN_EMAIL:?}
      ARCHE_SEED_ADMIN_PASSWORD: ${ARCHE_SEED_ADMIN_PASSWORD:?}
      ARCHE_SEED_ADMIN_SLUG: ${ARCHE_SEED_ADMIN_SLUG:-admin}

      # Spawner config
      CONTAINER_PROXY_HOST: docker-socket-proxy
      CONTAINER_PROXY_PORT: "2375"
      OPENCODE_IMAGE: ${OPENCODE_IMAGE:-ghcr.io/peaberry-studio/arche/workspace:latest}
      OPENCODE_NETWORK: arche_internal

      # Connector OAuth/MCP overrides (optional)
      ARCHE_CONNECTOR_GOOGLE_CLIENT_ID: ${ARCHE_CONNECTOR_GOOGLE_CLIENT_ID:-}
      ARCHE_CONNECTOR_GOOGLE_CLIENT_SECRET: ${ARCHE_CONNECTOR_GOOGLE_CLIENT_SECRET:-}
      ARCHE_CONNECTOR_GOOGLE_GMAIL_MCP_URL: ${ARCHE_CONNECTOR_GOOGLE_GMAIL_MCP_URL:-}
      ARCHE_CONNECTOR_GOOGLE_DRIVE_MCP_URL: ${ARCHE_CONNECTOR_GOOGLE_DRIVE_MCP_URL:-}
      ARCHE_CONNECTOR_GOOGLE_CALENDAR_MCP_URL: ${ARCHE_CONNECTOR_GOOGLE_CALENDAR_MCP_URL:-}
      ARCHE_CONNECTOR_GOOGLE_CHAT_MCP_URL: ${ARCHE_CONNECTOR_GOOGLE_CHAT_MCP_URL:-}
      ARCHE_CONNECTOR_GOOGLE_PEOPLE_MCP_URL: ${ARCHE_CONNECTOR_GOOGLE_PEOPLE_MCP_URL:-}
      ARCHE_CONNECTOR_META_ADS_GRAPH_API_VERSION: ${ARCHE_CONNECTOR_META_ADS_GRAPH_API_VERSION:-}

      # Persistence paths
      ARCHE_USERS_PATH: ${ARCHE_USERS_PATH:-/opt/arche/users}
      KB_CONTENT_HOST_PATH: ${KB_CONTENT_HOST_PATH:-/opt/arche/kb-content}
      KB_CONFIG_HOST_PATH: ${KB_CONFIG_HOST_PATH:-/opt/arche/kb-config}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 5
    networks:
      - default
      - internal
    volumes:
      - ${KB_CONTENT_HOST_PATH:-/opt/arche/kb-content}:/kb-content
      - ${KB_CONFIG_HOST_PATH:-/opt/arche/kb-config}:/kb-config
      - ${ARCHE_USERS_PATH:-/opt/arche/users}:${ARCHE_USERS_PATH:-/opt/arche/users}
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - coolify.managed=true

networks:
  default:
  internal:
    name: arche_internal

volumes:
  postgres_data:
