# =============================================================================
# LOCAL DEVELOPMENT ONLY - DO NOT USE IN PRODUCTION
# =============================================================================
# This compose file is for local development with hardcoded defaults.
# For production deployment, use: ./infra/deploy/deploy.sh --remote
# The deploy script uses Ansible templates with proper secret management.
# =============================================================================

name: arche

services:
  # Proxy de seguridad para el Podman socket.
  # Filtra operaciones permitidas; tanto Traefik como web lo usan.
  docker-socket-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:master
    environment:
      CONTAINERS: 1  # listar/inspeccionar contenedores
      NETWORKS: 1    # ver redes
      IMAGES: 1      # ver imágenes
      INFO: 1        # info del daemon
      POST: 1        # crear contenedores (para spawner)
      VOLUMES: 1     # crear volúmenes para workspaces
    volumes:
      - /run/podman/podman.sock:/var/run/docker.sock:ro
    networks:
      - arche-internal

  traefik:
    image: traefik:v3.6.7
    depends_on:
      - docker-socket-proxy
    command:
      # Dashboard enabled for local dev debugging (localhost:8081)
      # Production deployments disable this via Ansible templates
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.endpoint=tcp://docker-socket-proxy:2375
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --log.level=INFO
    ports:
      - 8080:80
      - 8081:8080
    networks:
      - default
      - arche-internal

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: arche
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - 5432:5432
    volumes:
      - arche_postgres:/var/lib/postgresql/data

  web:
    image: node:24-bookworm-slim
    working_dir: /app
    environment:
      # Base host
      ARCHE_DOMAIN: arche.lvh.me

      # Postgres dentro del stack.
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/arche?schema=public

      # Seed primer admin (idempotente)
      ARCHE_SEED_ADMIN_EMAIL: admin@example.com
      ARCHE_SEED_ADMIN_PASSWORD: change-me
      ARCHE_SEED_ADMIN_SLUG: admin

      # Spawner
      CONTAINER_PROXY_HOST: docker-socket-proxy
      CONTAINER_PROXY_PORT: "2375"
      # Encryption key for instance passwords (generate with: openssl rand -base64 32)
      ARCHE_ENCRYPTION_KEY: ${ARCHE_ENCRYPTION_KEY:-}
      # Gateway
      ARCHE_GATEWAY_TOKEN_SECRET: ${ARCHE_GATEWAY_TOKEN_SECRET:-}
      ARCHE_GATEWAY_TOKEN_TTL_SECONDS: ${ARCHE_GATEWAY_TOKEN_TTL_SECONDS:-}
      ARCHE_GATEWAY_BASE_URL: ${ARCHE_GATEWAY_BASE_URL:-}
      # Usar imagen personalizada con git (build con: podman build -t arche-workspace infra/workspace-image)
      OPENCODE_IMAGE: arche-workspace:latest
      OPENCODE_NETWORK: arche-internal
      # Path al KB en el host (debe existir antes de crear workspaces)
      # Configurar via: export KB_HOST_PATH=/path/to/kb
      KB_HOST_PATH: ${KB_HOST_PATH:-}
      # Path para datos persistentes de usuario
      ARCHE_USERS_PATH: ${ARCHE_USERS_PATH:-/tmp/arche-users}
    networks:
      - default
      - arche-internal
    volumes:
      - ./../../apps/web:/app
      - arche_web_node_modules:/app/node_modules
      - ${ARCHE_USERS_PATH:-/tmp/arche-users}:${ARCHE_USERS_PATH:-/tmp/arche-users}
    command: sh -lc "corepack enable && pnpm install && pnpm prisma generate && pnpm dev"
    labels:
      - traefik.enable=true
      - traefik.docker.network=arche_default
      - traefik.http.routers.arche.rule=Host(`arche.lvh.me`)
      - traefik.http.routers.arche.entrypoints=web
      - traefik.http.routers.arche.service=arche-web
      - traefik.http.services.arche-web.loadbalancer.server.port=3000

networks:
  default:
    name: arche_default
  arche-internal:
    name: arche-internal
    external: true

volumes:
  arche_postgres:
  arche_web_node_modules:
  arche_kb:
