name: arche

services:
  traefik:
    image: traefik:v3.6.7
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --log.level=INFO
    ports:
      - 80:80
      - 8080:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3
    environment:
      CONTAINERS: 1
      NETWORKS: 1
      IMAGES: 1
      INFO: 1
      POST: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - arche-internal

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: arche
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - 5432:5432
    volumes:
      - arche_postgres:/var/lib/postgresql/data

  web:
    image: node:24-bookworm-slim
    working_dir: /app
    environment:
      # Base host. Los hosts usuario son u-<slug>.<ARCHE_DOMAIN>.
      ARCHE_DOMAIN: arche.lvh.me

      # Postgres dentro del stack.
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/arche?schema=public

      # Seed primer admin (idempotente)
      ARCHE_SEED_ADMIN_EMAIL: admin@example.com
      ARCHE_SEED_ADMIN_PASSWORD: change-me
      ARCHE_SEED_ADMIN_SLUG: admin

      # Spawner
      DOCKER_PROXY_HOST: docker-socket-proxy
      DOCKER_PROXY_PORT: "2375"
      OPENCODE_IMAGE: ghcr.io/anomalyco/opencode:1.1.45
      OPENCODE_NETWORK: arche-internal
    networks:
      - default
      - arche-internal
    volumes:
      - ./../../apps/web:/app
      - arche_web_node_modules:/app/node_modules
    command: sh -lc "corepack enable && pnpm install && pnpm prisma generate && pnpm dev"
    labels:
      - traefik.enable=true

      # Base (sin forwardAuth para permitir login y bootstrap)
      - traefik.http.routers.arche-base.rule=Host(`arche.lvh.me`)
      - traefik.http.routers.arche-base.entrypoints=web
      - traefik.http.routers.arche-base.service=arche-web

      # Subdominios de usuario (con forwardAuth)
      - traefik.http.routers.arche-user.rule=HostRegexp(`{subdomain:u-[a-z0-9-]+}.arche.lvh.me`)
      - traefik.http.routers.arche-user.entrypoints=web
      - traefik.http.routers.arche-user.service=arche-web
      - traefik.http.routers.arche-user.middlewares=arche-forwardauth

      - traefik.http.services.arche-web.loadbalancer.server.port=3000

      - traefik.http.middlewares.arche-forwardauth.forwardauth.address=http://web:3000/auth/traefik
      - traefik.http.middlewares.arche-forwardauth.forwardauth.trustForwardHeader=true

networks:
  arche-internal:
    name: arche-internal

volumes:
  arche_postgres:
  arche_web_node_modules:
