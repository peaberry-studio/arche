---
# Deployment mode: "remote" or "local-dev"
deploy_mode: "{{ lookup('env', 'DEPLOY_MODE') | default('remote', true) }}"

# Domain
domain: "{{ lookup('env', 'ARCHE_DOMAIN') | default('arche.lvh.me', true) }}"

# ACME email for Let's Encrypt
acme_email: "{{ lookup('env', 'ACME_EMAIL') | default('', true) }}"

# Podman socket path (Linux rootful default; macOS varies)
podman_socket_path: "{{ lookup('env', 'PODMAN_SOCKET_PATH') | default('/run/podman/podman.sock', true) }}"

# Container images
image_prefix: "{{ lookup('env', 'IMAGE_PREFIX') | default('ghcr.io/peaberry-studio/arche/', true) }}"
web_version: "{{ lookup('env', 'WEB_VERSION') | default('latest', true) }}"
web_image: "{{ lookup('env', 'WEB_IMAGE') | default(image_prefix ~ 'web:' ~ web_version, true) }}"
opencode_image: "{{ lookup('env', 'OPENCODE_IMAGE') | default('arche-workspace:latest', true) }}"

# GHCR auth
ghcr_token: "{{ lookup('env', 'GHCR_TOKEN') | default('', true) }}"

# Database
postgres_password: "{{ lookup('env', 'POSTGRES_PASSWORD') | default('postgres', true) }}"

# Application secrets
arche_session_pepper: "{{ lookup('env', 'ARCHE_SESSION_PEPPER') | default('', true) }}"
arche_encryption_key: "{{ lookup('env', 'ARCHE_ENCRYPTION_KEY') | default('', true) }}"
arche_internal_token: "{{ lookup('env', 'ARCHE_INTERNAL_TOKEN') | default('', true) }}"
arche_connector_oauth_state_secret: "{{ lookup('env', 'ARCHE_CONNECTOR_OAUTH_STATE_SECRET') | default('', true) }}"

# Gateway
arche_gateway_token_secret: "{{ lookup('env', 'ARCHE_GATEWAY_TOKEN_SECRET') | default('', true) }}"
arche_gateway_token_ttl_seconds: "{{ lookup('env', 'ARCHE_GATEWAY_TOKEN_TTL_SECONDS') | default('', true) }}"
arche_gateway_base_url: "{{ lookup('env', 'ARCHE_GATEWAY_BASE_URL') | default('', true) }}"
arche_public_base_url: "{{ lookup('env', 'ARCHE_PUBLIC_BASE_URL') | default('', true) }}"
arche_session_ttl_days: "{{ lookup('env', 'ARCHE_SESSION_TTL_DAYS') | default('', true) }}"

# Connector overrides
arche_connector_gateway_base_url: "{{ lookup('env', 'ARCHE_CONNECTOR_GATEWAY_BASE_URL') | default('', true) }}"
arche_connector_gateway_token_secret: "{{ lookup('env', 'ARCHE_CONNECTOR_GATEWAY_TOKEN_SECRET') | default('', true) }}"
arche_connector_oauth_state_ttl_seconds: "{{ lookup('env', 'ARCHE_CONNECTOR_OAUTH_STATE_TTL_SECONDS') | default('', true) }}"
arche_connector_oauth_max_authorize_url_length: "{{ lookup('env', 'ARCHE_CONNECTOR_OAUTH_MAX_AUTHORIZE_URL_LENGTH') | default('', true) }}"
arche_connector_linear_mcp_url: "{{ lookup('env', 'ARCHE_CONNECTOR_LINEAR_MCP_URL') | default('', true) }}"
arche_connector_notion_mcp_url: "{{ lookup('env', 'ARCHE_CONNECTOR_NOTION_MCP_URL') | default('', true) }}"
arche_connector_linear_scope: "{{ lookup('env', 'ARCHE_CONNECTOR_LINEAR_SCOPE') | default('', true) }}"
arche_connector_notion_scope: "{{ lookup('env', 'ARCHE_CONNECTOR_NOTION_SCOPE') | default('', true) }}"
arche_connector_notion_client_id: "{{ lookup('env', 'ARCHE_CONNECTOR_NOTION_CLIENT_ID') | default('', true) }}"
arche_connector_notion_client_secret: "{{ lookup('env', 'ARCHE_CONNECTOR_NOTION_CLIENT_SECRET') | default('', true) }}"
arche_connector_google_client_id: "{{ lookup('env', 'ARCHE_CONNECTOR_GOOGLE_CLIENT_ID') | default('', true) }}"
arche_connector_google_client_secret: "{{ lookup('env', 'ARCHE_CONNECTOR_GOOGLE_CLIENT_SECRET') | default('', true) }}"
arche_connector_google_gmail_mcp_url: "{{ lookup('env', 'ARCHE_CONNECTOR_GOOGLE_GMAIL_MCP_URL') | default('', true) }}"
arche_connector_google_drive_mcp_url: "{{ lookup('env', 'ARCHE_CONNECTOR_GOOGLE_DRIVE_MCP_URL') | default('', true) }}"
arche_connector_google_calendar_mcp_url: "{{ lookup('env', 'ARCHE_CONNECTOR_GOOGLE_CALENDAR_MCP_URL') | default('', true) }}"
arche_connector_google_chat_mcp_url: "{{ lookup('env', 'ARCHE_CONNECTOR_GOOGLE_CHAT_MCP_URL') | default('', true) }}"
arche_connector_google_people_mcp_url: "{{ lookup('env', 'ARCHE_CONNECTOR_GOOGLE_PEOPLE_MCP_URL') | default('', true) }}"
arche_connector_meta_ads_graph_api_version: "{{ lookup('env', 'ARCHE_CONNECTOR_META_ADS_GRAPH_API_VERSION') | default('', true) }}"

# Seed admin
arche_seed_admin_email: "{{ lookup('env', 'ARCHE_SEED_ADMIN_EMAIL') | default('admin@example.com', true) }}"
arche_seed_admin_password: "{{ lookup('env', 'ARCHE_SEED_ADMIN_PASSWORD') | default('change-me', true) }}"
arche_seed_admin_slug: "{{ lookup('env', 'ARCHE_SEED_ADMIN_SLUG') | default('admin', true) }}"

# System user
deploy_user: deploy

# Paths
app_dir: /opt/arche
data_dir: /opt/arche/data
users_path: "{{ lookup('env', 'ARCHE_USERS_PATH') | default('/opt/arche/users', true) }}"
