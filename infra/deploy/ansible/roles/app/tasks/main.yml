---
- name: Create users data directory
  ansible.builtin.file:
    path: "{{ users_path | default('/opt/arche/users') }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0750"

- name: Log in to GHCR
  ansible.builtin.command:
    cmd: podman login ghcr.io -u arche-deploy --password-stdin
    stdin: "{{ ghcr_token }}"
  changed_when: true
  no_log: true
  when: ghcr_token | length > 0

- name: Render compose.yml
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ app_dir }}/compose.yml"
    owner: deploy
    group: deploy
    mode: "0644"

- name: Render .env file
  ansible.builtin.template:
    src: .env.j2
    dest: "{{ app_dir }}/.env"
    owner: deploy
    group: deploy
    mode: "0600"

- name: Ensure arche-internal network exists
  ansible.builtin.command:
    cmd: podman network create arche-internal
  register: network_create
  changed_when: network_create.rc == 0
  failed_when: network_create.rc != 0 and 'already exists' not in network_create.stderr
  ignore_errors: true

- name: Pull images
  ansible.builtin.command:
    cmd: podman-compose -f {{ app_dir }}/compose.yml pull
  changed_when: true

- name: Stop existing containers
  ansible.builtin.command:
    cmd: podman-compose -f {{ app_dir }}/compose.yml down --remove-orphans
  changed_when: true
  ignore_errors: true

- name: Start containers
  ansible.builtin.command:
    cmd: podman-compose -f {{ app_dir }}/compose.yml --env-file {{ app_dir }}/.env up -d
  changed_when: true

- name: Wait for web service to be ready
  ansible.builtin.command:
    cmd: podman-compose -f {{ app_dir }}/compose.yml exec -T web sh -c "curl -sf http://localhost:3000/ > /dev/null 2>&1"
  register: health_check
  retries: 30
  delay: 5
  until: health_check.rc == 0
  changed_when: false
  ignore_errors: true

- name: Run Prisma migrations
  ansible.builtin.command:
    cmd: podman-compose -f {{ app_dir }}/compose.yml exec -T web pnpm prisma migrate deploy
  changed_when: true
  register: migration_result
  ignore_errors: true

- name: Display migration result
  ansible.builtin.debug:
    var: migration_result.stdout_lines
  when: migration_result.stdout_lines is defined

- name: Run seed
  ansible.builtin.command:
    cmd: podman-compose -f {{ app_dir }}/compose.yml exec -T web pnpm prisma db seed
  changed_when: true
  ignore_errors: true
