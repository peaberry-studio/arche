name: E2E Real Runtime

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop-e2e-real-runtime:
    name: Desktop E2E - Real Runtime
    runs-on: macos-14
    if: github.event_name != 'schedule' || vars.ARCHE_ENABLE_REAL_RUNTIME_NIGHTLY == 'true'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Enable Corepack
        run: corepack enable

      - name: Install web dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Refresh web native modules
        working-directory: apps/web
        run: pnpm rebuild argon2 better-sqlite3

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Run desktop E2E real-runtime tests
        working-directory: apps/desktop
        env:
          ARCHE_ENABLE_E2E_HOOKS: '1'
          ARCHE_ENCRYPTION_KEY: ZGV2LWluc2VjdXJlLWtleS0zMi1ieXRlcy1sb25nISE=
          ARCHE_E2E_PROFILE: real-runtime
          CI: true
          ARCHE_E2E_FAKE_PROVIDER_URL: http://127.0.0.1:4211/v1
          ARCHE_E2E_FAKE_PROVIDER_PORT: '4211'
          ARCHE_E2E_FAKE_PROVIDER_API_KEY: sk-e2e-fake-provider
        run: pnpm exec playwright test e2e/workspace-launch.spec.ts e2e/experts-create.spec.ts e2e/chat-pdf.spec.ts

      - name: Upload desktop Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-playwright-report-real-runtime
          path: apps/desktop/playwright-report

      - name: Upload desktop test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-test-results-real-runtime
          path: apps/desktop/test-results

  web-e2e-real-runtime:
    name: Web E2E - Real Runtime
    runs-on: [self-hosted, linux, podman]
    if: github.event_name != 'schedule' || vars.ARCHE_ENABLE_REAL_RUNTIME_NIGHTLY == 'true'
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: arche_ci
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d arche_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      ARCHE_ENABLE_E2E_HOOKS: '1'
      ARCHE_ENCRYPTION_KEY: ZGV2LWluc2VjdXJlLWtleS0zMi1ieXRlcy1sb25nISE=
      ARCHE_E2E_PROFILE: real-runtime
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/arche_ci
      ARCHE_SEED_ADMIN_EMAIL: admin-e2e@arche.local
      ARCHE_SEED_ADMIN_PASSWORD: arche-e2e-admin
      ARCHE_SEED_ADMIN_SLUG: admin
      KB_CONTENT_HOST_PATH: ${{ github.workspace }}/apps/web/.e2e/kb-content
      KB_CONFIG_HOST_PATH: ${{ github.workspace }}/apps/web/.e2e/kb-config
      ARCHE_USERS_PATH: ${{ github.workspace }}/apps/web/.e2e/users
      ARCHE_E2E_FAKE_PROVIDER_URL: http://127.0.0.1:4211/v1
      ARCHE_E2E_FAKE_PROVIDER_PORT: '4211'
      ARCHE_E2E_FAKE_PROVIDER_API_KEY: sk-e2e-fake-provider

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run web E2E real-runtime tests
        run: pnpm exec playwright test e2e/login.spec.ts e2e/skills-create.spec.ts e2e/runtime-launch.spec.ts e2e/chat-pdf.spec.ts

      - name: Upload web Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-playwright-report-real-runtime
          path: apps/web/playwright-report

      - name: Upload web test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-test-results-real-runtime
          path: apps/web/test-results
