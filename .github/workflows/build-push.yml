name: Build & Push Web Image

on:
  workflow_call:
  push:
    tags:
      - "v*.*.*"
  repository_dispatch:
    types: [build-pr-image]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number (for PR builds)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.ref || github.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: tags
        run: |
          SHA_TAG="$(git rev-parse --short HEAD)"
          ARCH_SUFFIX="-${{ matrix.arch }}"
          DEFAULT_ARCH_TAGS=false
          if [[ "${{ matrix.arch }}" == "amd64" ]]; then
            DEFAULT_ARCH_TAGS=true
          fi

          echo "SHA_TAG=$SHA_TAG" >> "$GITHUB_OUTPUT"
          echo "ARCH_SUFFIX=$ARCH_SUFFIX" >> "$GITHUB_OUTPUT"
          echo "DEFAULT_ARCH_TAGS=$DEFAULT_ARCH_TAGS" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.event_name }}" == "repository_dispatch" ]] || [[ -n "${{ github.event.inputs.pr_number }}" ]]; then
            PR_NUM="${{ github.event.client_payload.pr_number || github.event.inputs.pr_number }}"
            echo "PR_NUMBER=$PR_NUM" >> $GITHUB_OUTPUT
            echo "PR_TAG=pr-$PR_NUM" >> $GITHUB_OUTPUT
            echo "MODE=pr" >> $GITHUB_OUTPUT
            echo "Building PR image with tag: pr-$PR_NUM$ARCH_SUFFIX"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]] && [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "MODE=release" >> "$GITHUB_OUTPUT"
            echo "Building release image with tag: ${GITHUB_REF_NAME}$ARCH_SUFFIX"
          else
            echo "MODE=main" >> "$GITHUB_OUTPUT"
            echo "Building main branch image with tags: latest$ARCH_SUFFIX, ${SHA_TAG}$ARCH_SUFFIX"
          fi

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: apps
          file: apps/web/Containerfile
          push: true
          platforms: linux/${{ matrix.arch }}
          build-args: |
            GIT_SHA=${{ steps.tags.outputs.SHA_TAG }}
          tags: |
            ${{ steps.tags.outputs.MODE == 'pr' && format('{0}/{1}:{2}{3}', env.REGISTRY, env.IMAGE_NAME, steps.tags.outputs.PR_TAG, steps.tags.outputs.ARCH_SUFFIX) || '' }}
            ${{ steps.tags.outputs.MODE == 'pr' && steps.tags.outputs.DEFAULT_ARCH_TAGS == 'true' && format('{0}/{1}:{2}', env.REGISTRY, env.IMAGE_NAME, steps.tags.outputs.PR_TAG) || '' }}
            ${{ steps.tags.outputs.MODE == 'release' && format('{0}/{1}:{2}{3}', env.REGISTRY, env.IMAGE_NAME, steps.tags.outputs.RELEASE_TAG, steps.tags.outputs.ARCH_SUFFIX) || '' }}
            ${{ steps.tags.outputs.MODE == 'release' && steps.tags.outputs.DEFAULT_ARCH_TAGS == 'true' && format('{0}/{1}:{2}', env.REGISTRY, env.IMAGE_NAME, steps.tags.outputs.RELEASE_TAG) || '' }}
            ${{ steps.tags.outputs.MODE == 'main' && format('{0}/{1}:latest{2}', env.REGISTRY, env.IMAGE_NAME, steps.tags.outputs.ARCH_SUFFIX) || '' }}
            ${{ steps.tags.outputs.MODE == 'main' && format('{0}/{1}:{2}{3}', env.REGISTRY, env.IMAGE_NAME, steps.tags.outputs.SHA_TAG, steps.tags.outputs.ARCH_SUFFIX) || '' }}
            ${{ steps.tags.outputs.MODE == 'main' && steps.tags.outputs.DEFAULT_ARCH_TAGS == 'true' && format('{0}/{1}:latest', env.REGISTRY, env.IMAGE_NAME) || '' }}
            ${{ steps.tags.outputs.MODE == 'main' && steps.tags.outputs.DEFAULT_ARCH_TAGS == 'true' && format('{0}/{1}:{2}', env.REGISTRY, env.IMAGE_NAME, steps.tags.outputs.SHA_TAG) || '' }}

      - name: Comment PR with image info
        if: steps.tags.outputs.MODE == 'pr' && matrix.arch == 'amd64'
        run: |
          IMAGE="$REGISTRY/$IMAGE_NAME:${{ steps.tags.outputs.PR_TAG }}"
          ARM_IMAGE="$REGISTRY/$IMAGE_NAME:${{ steps.tags.outputs.PR_TAG }}-arm64"
          BODY=$(printf '📦 **PR Image Built Successfully**\n\nDefault (amd64):\n```\n%s\n```\n\nOptional arm64:\n```\n%s\n```' "$IMAGE" "$ARM_IMAGE")
          PAYLOAD=$(jq -nc --arg body "$BODY" '{body: $body}')

          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.tags.outputs.PR_NUMBER }}/comments" \
            -d "$PAYLOAD"
