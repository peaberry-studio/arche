name: PR Commands

on:
  issue_comment:
    types: [created]
  workflow_dispatch:

jobs:
  handle-build-command:
    if: |
      startsWith(github.event.comment.body, '/build') &&
      github.event.issue.pull_request != null
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Get PR branch
        id: get-pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('pr_branch', pr.head.ref);
            console.log(`PR branch: ${pr.head.ref}`);

      - name: Trigger build via repository dispatch
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/dispatches" \
            -d '{
              "event_type": "build-pr-image",
              "client_payload": {
                "pr_number": "${{ github.event.issue.number }}",
                "comment_id": "${{ github.event.comment.id }}",
                "ref": "${{ steps.get-pr.outputs.pr_branch }}"
              }
            }'

      - name: Acknowledge build request
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -d '{"content": "+1"}'
