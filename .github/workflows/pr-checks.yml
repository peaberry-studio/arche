name: PR Checks

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "apps/desktop/**"
      - "scripts/**"
      - ".github/workflows/pr-checks.yml"
  workflow_dispatch:

jobs:
  web-lint-test:
    name: Web - Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  web-e2e-smoke:
    name: Web - E2E Smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: arche_ci
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d arche_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      ARCHE_ENABLE_E2E_HOOKS: '1'
      ARCHE_ENCRYPTION_KEY: ZGV2LWluc2VjdXJlLWtleS0zMi1ieXRlcy1sb25nISE=
      ARCHE_SEED_ADMIN_EMAIL: admin-e2e@arche.local
      ARCHE_SEED_ADMIN_PASSWORD: arche-e2e-admin
      ARCHE_SEED_ADMIN_SLUG: admin
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/arche_ci

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run web E2E smoke tests
        run: pnpm test:e2e

      - name: Upload web Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-playwright-report
          path: apps/web/playwright-report

      - name: Upload web test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-test-results
          path: apps/web/test-results

  desktop-build-test:
    name: Desktop - Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

  desktop-e2e-smoke:
    name: Desktop - E2E Smoke
    runs-on: macos-14
    permissions:
      contents: read
    env:
      ARCHE_ENABLE_E2E_HOOKS: '1'
      ARCHE_ENCRYPTION_KEY: ZGV2LWluc2VjdXJlLWtleS0zMi1ieXRlcy1sb25nISE=

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Enable Corepack
        run: corepack enable

      - name: Install web dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Refresh web native modules
        working-directory: apps/web
        run: pnpm rebuild argon2 better-sqlite3

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Run desktop E2E smoke tests
        working-directory: apps/desktop
        env:
          CI: true
        run: pnpm test:e2e

      - name: Upload desktop Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-playwright-report
          path: apps/desktop/playwright-report

      - name: Upload desktop test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-test-results
          path: apps/desktop/test-results

  desktop-workspace-smoke:
    name: Desktop - Workspace Smoke
    runs-on: macos-14
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Enable Corepack
        run: corepack enable

      - name: Install web dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Refresh web native modules
        working-directory: apps/web
        run: pnpm rebuild argon2 better-sqlite3

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Run desktop workspace smoke test
        working-directory: apps/desktop
        env:
          CI: true
        run: pnpm test:smoke
