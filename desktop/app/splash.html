<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arche Desktop</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 10% 20%, #f8fbff 0%, #eef4ff 45%, #e8eefb 100%);
        color: #0f172a;
      }

      .panel {
        width: min(560px, 90vw);
        border-radius: 20px;
        border: 1px solid #d4def2;
        background: #ffffffd9;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        padding: 28px 30px;
      }

      h1 {
        margin: 0;
        font-size: 1.4rem;
      }

      p {
        margin: 10px 0 0;
        color: #334155;
      }

      .status {
        margin-top: 14px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #1e293b;
        font-size: 0.92rem;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #2563eb;
        box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.5);
        animation: pulse 1.6s ease-in-out infinite;
      }

      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.55); }
        100% { box-shadow: 0 0 0 12px rgba(37, 99, 235, 0); }
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Starting Arche Desktop</h1>
      <p>Preparing local services and your personal workspace.</p>
      <div class="status"><span class="dot" aria-hidden="true"></span>Bootstrapping runtime...</div>
    </main>
  </body>
</html>
